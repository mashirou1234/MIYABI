name: build

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure (CMake)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DMIYABI_PERFORMANCE_TEST=ON

      - name: Build (CMake)
        run: cmake --build build -j4

      - name: Smoke (logic cargo test)
        run: cargo test --manifest-path logic/Cargo.toml

      - name: Smoke (sample_game cargo test)
        run: cargo test --manifest-path sample_game/Cargo.toml

      - name: Smoke (core executable exists)
        run: test -x build/core/miyabi

      - name: SDK ABI smoke
        run: |
          grep -nE "vtable\\.abi_version[[:space:]]*!=[[:space:]]*MIYABI_ABI_VERSION" sdk_template_main.cpp
          python3 - <<'PY'
          import pathlib
          import re

          header = pathlib.Path("core/include/miyabi/miyabi.h").read_text(encoding="utf-8")
          major_m = re.search(r"#define\\s+MIYABI_ABI_VERSION_MAJOR\\s+(\\d+)", header)
          minor_m = re.search(r"#define\\s+MIYABI_ABI_VERSION_MINOR\\s+(\\d+)", header)
          patch_m = re.search(r"#define\\s+MIYABI_ABI_VERSION_PATCH\\s+(\\d+)", header)
          if not (major_m and minor_m and patch_m):
              raise SystemExit("ABI version macros not found in core/include/miyabi/miyabi.h")
          header_abi = (int(major_m.group(1)) << 16) | (int(minor_m.group(1)) << 8) | int(patch_m.group(1))

          logic = pathlib.Path("logic/src/lib.rs").read_text(encoding="utf-8")
          logic_m = re.search(r"const\\s+MIYABI_ABI_VERSION\\s*:\\s*u32\\s*=\\s*(.*?);", logic)
          if not logic_m:
              raise SystemExit("MIYABI_ABI_VERSION not found in logic/src/lib.rs")
          logic_expr = logic_m.group(1).replace("u32", "")
          logic_abi = int(eval(logic_expr, {"__builtins__": {}}, {}))

          print(f"header_abi={header_abi} logic_abi={logic_abi}")
          if header_abi != logic_abi:
              raise SystemExit("ABI mismatch detected")
          PY

      - name: Perf baseline (headless benchmark)
        run: |
          cargo run --release --manifest-path logic/Cargo.toml --bin perf_baseline -- \
            --output build/perf/current_baseline.json

      - name: Perf regression check
        run: |
          python3 tools/check_perf_regression.py \
            --baseline docs/perf/baseline_macos14.json \
            --current build/perf/current_baseline.json \
            --output build/perf/regression_report.md

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-${{ github.run_id }}
          path: |
            build/perf/current_baseline.json
            build/perf/regression_report.md
