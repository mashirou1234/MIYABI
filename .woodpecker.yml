# push(main/master) と pull_request を有効化。
# 非Rustリポジトリで誤配布された場合は、Cargo.toml 未検出時に各ステップを成功スキップする。
when:
  - event: [pull_request]
  - event: [push]
    branch: [main, master]

steps:
  - name: fmt
    image: rust:1
    commands:
      - |
        set -eu
        if [ ! -f Cargo.toml ]; then
          echo "Cargo.toml not found. Skip fmt."
          exit 0
        fi
        if [ -f rust-toolchain.toml ]; then
          toolchain="$(sed -nE 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' rust-toolchain.toml | head -n 1)"
        elif [ -f rust-toolchain ]; then
          toolchain="$(head -n 1 rust-toolchain | tr -d '[:space:]')"
        else
          toolchain=""
        fi
        if [ -n "${toolchain}" ]; then
          rustup toolchain install "${toolchain}" --profile minimal
          rustup default "${toolchain}"
        else
          echo "rust-toolchain* not found. Use rust:1 (stable)."
        fi
      - rustup component add rustfmt
      - cargo fmt --check

  - name: clippy
    image: rust:1
    commands:
      - |
        set -eu
        if [ ! -f Cargo.toml ]; then
          echo "Cargo.toml not found. Skip clippy."
          exit 0
        fi
        if [ -f rust-toolchain.toml ]; then
          toolchain="$(sed -nE 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' rust-toolchain.toml | head -n 1)"
        elif [ -f rust-toolchain ]; then
          toolchain="$(head -n 1 rust-toolchain | tr -d '[:space:]')"
        else
          toolchain=""
        fi
        if [ -n "${toolchain}" ]; then
          rustup toolchain install "${toolchain}" --profile minimal
          rustup default "${toolchain}"
        else
          echo "rust-toolchain* not found. Use rust:1 (stable)."
        fi
      - rustup component add clippy
      - cargo clippy -- -D warnings

  - name: test
    image: rust:1
    commands:
      - |
        set -eu
        if [ ! -f Cargo.toml ]; then
          echo "Cargo.toml not found. Skip test."
          exit 0
        fi
        if [ -f rust-toolchain.toml ]; then
          toolchain="$(sed -nE 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' rust-toolchain.toml | head -n 1)"
        elif [ -f rust-toolchain ]; then
          toolchain="$(head -n 1 rust-toolchain | tr -d '[:space:]')"
        else
          toolchain=""
        fi
        if [ -n "${toolchain}" ]; then
          rustup toolchain install "${toolchain}" --profile minimal
          rustup default "${toolchain}"
        else
          echo "rust-toolchain* not found. Use rust:1 (stable)."
        fi
      - cargo test

  - name: build-release
    image: rust:1
    commands:
      - |
        set -eu
        if [ ! -f Cargo.toml ]; then
          echo "Cargo.toml not found. Skip build-release."
          exit 0
        fi
        if [ -f rust-toolchain.toml ]; then
          toolchain="$(sed -nE 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' rust-toolchain.toml | head -n 1)"
        elif [ -f rust-toolchain ]; then
          toolchain="$(head -n 1 rust-toolchain | tr -d '[:space:]')"
        else
          toolchain=""
        fi
        if [ -n "${toolchain}" ]; then
          rustup toolchain install "${toolchain}" --profile minimal
          rustup default "${toolchain}"
        else
          echo "rust-toolchain* not found. Use rust:1 (stable)."
        fi
      - cargo build --release

  - name: miyabi-build
    image: rust:1
    when:
      - event: [pull_request]
      - event: [push]
        branch: [main, master]
    commands:
      - |
        set -eu
        export PATH="/usr/local/cargo/bin:${PATH}"
        if command -v apt-get >/dev/null 2>&1 && [ "$(id -u)" = "0" ]; then
          apt-get update
          apt-get install -y --no-install-recommends cmake python3 g++ pkg-config
          rm -rf /var/lib/apt/lists/*
        fi
        if command -v cmake >/dev/null 2>&1; then
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DMIYABI_PERFORMANCE_TEST=ON
          cmake --build build -j2
          test -x build/core/miyabi
        else
          echo "cmake not found. Skip native build checks."
        fi
      - ./scripts/check_core_public_header_include_order.sh
      - cargo test --manifest-path logic/Cargo.toml
      - cargo test --manifest-path sample_game/Cargo.toml
      - grep -nE "vtable\\.abi_version[[:space:]]*!=[[:space:]]*MIYABI_ABI_VERSION" sdk_template_main.cpp
      - |
        python3 - <<'PY'
        import pathlib
        import re

        header = pathlib.Path("core/include/miyabi/miyabi.h").read_text(encoding="utf-8")
        major_m = re.search(r"#define\s+MIYABI_ABI_VERSION_MAJOR\s+(\d+)", header)
        minor_m = re.search(r"#define\s+MIYABI_ABI_VERSION_MINOR\s+(\d+)", header)
        patch_m = re.search(r"#define\s+MIYABI_ABI_VERSION_PATCH\s+(\d+)", header)
        if not (major_m and minor_m and patch_m):
            raise SystemExit("ABI version macros not found in core/include/miyabi/miyabi.h")
        header_abi = (int(major_m.group(1)) << 16) | (int(minor_m.group(1)) << 8) | int(patch_m.group(1))

        logic = pathlib.Path("logic/src/lib.rs").read_text(encoding="utf-8")
        logic_m = re.search(r"const\s+MIYABI_ABI_VERSION\s*:\s*u32\s*=\s*(.*?);", logic)
        if not logic_m:
            raise SystemExit("MIYABI_ABI_VERSION not found in logic/src/lib.rs")
        logic_expr = logic_m.group(1).replace("u32", "")
        logic_abi = int(eval(logic_expr, {"__builtins__": {}}, {}))

        print(f"header_abi={header_abi} logic_abi={logic_abi}")
        if header_abi != logic_abi:
            raise SystemExit("ABI mismatch detected")
        PY
