name: pr-auto-approve-merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-auto-approve-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  approve-and-enable-automerge:
    name: Auto approve and enable auto-merge
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.draft == false &&
      (github.event.pull_request.base.ref == 'master' || github.event.pull_request.base.ref == 'main') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !contains(github.event.pull_request.labels.*.name, 'automerge:off')
    steps:
      - name: Check trusted author
        id: trusted
        uses: actions/github-script@v7
        with:
          script: |
            const allowedAssociations = new Set(["OWNER", "MEMBER", "COLLABORATOR"]);
            const association = context.payload.pull_request.author_association;
            const isAllowed = allowedAssociations.has(association);
            core.setOutput("is_allowed", String(isAllowed));
            if (!isAllowed) {
              core.notice(`Skip auto approval: author_association=${association}`);
            }

      - name: Auto approve pull request
        if: steps.trusted.outputs.is_allowed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pull_number = context.payload.pull_request.number;
            try {
              await github.rest.pulls.createReview({
                ...context.repo,
                pull_number,
                event: "APPROVE",
                body: "Automated approval: merge proceeds after required checks pass."
              });
              core.info(`Approved PR #${pull_number}.`);
            } catch (error) {
              if (error.status === 422) {
                core.info(`Approval skipped: ${error.message}`);
              } else {
                throw error;
              }
            }

      - name: Enable auto-merge (squash)
        if: steps.trusted.outputs.is_allowed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequestId = context.payload.pull_request.node_id;
            const mutation = `
              mutation($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId, mergeMethod: SQUASH}) {
                  pullRequest {
                    number
                  }
                }
              }
            `;
            try {
              await github.graphql(mutation, { pullRequestId });
              core.info("Enabled auto-merge (squash).");
            } catch (error) {
              const message = String(error?.message || "");
              if (message.includes("Auto merge is already enabled")) {
                core.info("Auto-merge is already enabled.");
                return;
              }
              throw error;
            }
